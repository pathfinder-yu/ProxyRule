# 机场节点订阅
proxy-providers:
  机场名称:
    url: "将该文本替换为你的机场订阅链接，不要漏了引号"
    type: http
    interval: 86400
    filter: "(?i)^(?!(.*(更新|客户端|网站|套餐到期|官网|剩余|倍率说明|官方|流量))).*$"
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

proxies:
  - { name: 直连, type: direct }
  - { name: 拒绝, type: reject }

# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
secret: "123456"

# ========================
# DNS 设置
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 223.5.5.5
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    # 极速通
    - +.gfw.gg

ipv6: false

# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: mixed
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: true
  auto-redirect: true
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

